#-------------------------------------------------------------------
#-----------------       BIOCYPHER SETTINGS        -----------------
#-------------------------------------------------------------------
biocypher:
  dbms: neo4j
  offline: true
  schema_config_path: config/schema_config.yaml
  strict_mode: false
  head_ontology:
    url: https://github.com/biolink/biolink-model/raw/v3.2.1/biolink-model.owl.ttl
    root_node: entity
    switch_label_and_id: true
  debug: false
  cache_directory: .cache
  output_directory: biocypher-out
  log_directory: biocypher-log

#-------------------------------------------------------------------
#-----------------       OUTPUT Configuration      -----------------
#-------------------------------------------------------------------
#---- NEO4J database management system
neo4j:
  database_name: neo4j
  delimiter: "\t"
  array_delimiter: ";"
  quote_character: '"'
  skip_duplicate_nodes: true
  skip_bad_relationships: true

  # ---------- YOUR CODE STARTS HERE ----------
  # Step 1: Set the path to your Neo4j instance binary folder.
  #
  #   This tells BioCypher where to find the neo4j-admin executable so it can
  #   build the correct import command for your machine.
  #
  #   To find the path:
  #     1. Open Neo4j Desktop.
  #     2. Go to the Overview tab of your instance.
  #     3. Copy the path shown — it looks like /path/to/neo4j-instance/
  #     4. Append /bin/ to that path.
  #
  #   Then uncomment and fill in the line below:
  # import_call_bin_prefix: /path/to/your/neo4j-instance/bin/
  # ---------- YOUR CODE ENDS HERE ----------
