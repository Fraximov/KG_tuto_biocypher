#-------------------------------------------------------------------
#------------------      RELATIONSHIPS (EDGES)     -----------------
#-------------------------------------------------------------------
#====   PARENT EDGES
protein protein interaction:
    is_a: pairwise molecular interaction
    represented_as: edge
    input_label: protein_protein_interaction
    properties:
        is_directed: bool
        is_stimulation: bool
        is_inhibition: bool
        consensus_direction: bool
        consensus_stimulation: bool
        consensus_inhibition: bool

#====   INHERITED EDGES
activation:
    is_a: protein protein interaction
    inherit_properties: true
    represented_as: edge
    input_label: activation

# Step 2: Use one interaction as the full reference template.
#
# Why this matters:
#   A single correct example reduces schema drift and makes the
#   remaining interaction declarations easy to replicate.
#
# Hint:
#   Use activation as the completed pattern.

# Step 3: Complete the remaining interaction edge types.
#
# Why this matters:
#   Each interaction type in the dataset needs a matching schema entry
#   so BioCypher can map edge labels correctly.
#
# Hint:
#   For each interaction below, keep the same structure as activation:
#     is_a: protein protein interaction
#     inherit_properties: true
#     represented_as: edge
#     input_label: <same name as the interaction type>
# ---------- YOUR CODE STARTS HERE ----------
binding:
    is_a: protein protein interaction
    inherit_properties: true
    represented_as: edge
    input_label: binding

inhibition:
    is_a: protein protein interaction
    inherit_properties: true
    represented_as: edge
    input_label: inhibition

phosphorylation:
    is_a: protein protein interaction
    inherit_properties: true
    represented_as: edge
    input_label: phosphorylation

ubiquitination:
    is_a: protein protein interaction
    inherit_properties: true
    represented_as: edge
    input_label: ubiquitination
